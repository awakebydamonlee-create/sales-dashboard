*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;background:#f0f2f7;color:#1a1a2e}
.hdr{background:linear-gradient(135deg,#0f3460,#16213e,#1a1a2e);color:white;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hdr h1{font-size:20px;font-weight:700}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px}
.nav-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:rgba(255,255,255,.8);font-size:12px;font-weight:500;padding:7px 16px;text-decoration:none;transition:background .2s}
.nav-btn:hover{background:rgba(255,255,255,.2);color:white}
.nav-btn.active{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.4);color:white;font-weight:700;cursor:default;pointer-events:none}
/* Search */
.search-wrap{background:white;margin:20px 40px 0;border-radius:16px;padding:22px 24px;box-shadow:0 2px 16px rgba(0,0,0,.07);border-top:3px solid #6366f1}
.search-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:12px}
.search-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s;background:#fafafa}
.search-input:focus{border-color:#6366f1;background:white;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.search-btn{padding:10px 22px;background:#6366f1;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.search-btn:hover{background:#4f46e5}
.suggest-list{position:absolute;background:white;border:1.5px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:100;max-height:260px;overflow-y:auto;min-width:300px}
.suggest-item{padding:9px 15px;font-size:13px;cursor:pointer;border-bottom:1px solid #f8fafc;color:#374151}
.suggest-item:hover{background:#f0f0ff;color:#6366f1}
.suggest-item strong{color:#6366f1}
.suggest-item:last-child{border-bottom:none}
.search-pos{position:relative;flex:1;min-width:200px}
/* Report */
.report-wrap{margin:16px 40px 28px}
.hidden{display:none}
/* KPI strip */
.kstrip{display:flex;gap:0;background:white;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;margin-bottom:14px}
.ki{flex:1;padding:14px 16px;border-right:1px solid #f1f5f9;position:relative}
.ki:last-child{border-right:none}
.kl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kv{font-size:18px;font-weight:700;letter-spacing:-.5px}
.ks{font-size:10px;color:#64748b;margin-top:2px}
.bdg{position:absolute;top:9px;right:9px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
/* Cards */
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ct{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.cs{font-size:11px;color:#94a3b8;margin-bottom:12px}
.cw{position:relative}
/* Rank badge */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;font-size:18px;font-weight:800;flex-shrink:0}
.rank-1{background:#fef3c7;color:#d97706}
.rank-2{background:#f1f5f9;color:#64748b}
.rank-3{background:#fef3c7;color:#b45309}
.rank-other{background:#f0f0ff;color:#6366f1}
/* Co-purchase */
.co-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc}
.co-item:last-child{border-bottom:none}
.co-bar-wrap{flex:1;background:#f1f5f9;border-radius:4px;height:16px;overflow:hidden}
.co-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px}
.co-bar-text{font-size:9px;font-weight:700;color:white;white-space:nowrap}
/* Price */
.price-tag{font-size:24px;font-weight:800;letter-spacing:-1px}
/* Season chips */
.se-chip{display:inline-block;background:#f0f0ff;color:#6366f1;border:1px solid #c7d2fe;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;margin:2px 2px 0 0}
/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:12px}
/* Info box */
.ib{background:linear-gradient(135deg,#f8fafc,#eff6ff);border:1.5px solid #bfdbfe;border-radius:10px;padding:10px 13px;font-size:11px;color:#1e40af;line-height:1.75;margin-top:10px}
.ib strong{color:#1d4ed8}
/* Revenue rank progress */
.rev-rank-bar{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;margin-top:6px}
.rev-rank-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#6366f1,#8b5cf6)}
@media(max-width:1000px){.two,.three{grid-template-columns:1fr}.hdr,.report-wrap,.search-wrap{margin-left:16px;margin-right:16px}.hdr{padding:15px}}
</style>
</head>

let charts = {};
let currentProduct = null;

function dc(k){if(charts[k]){charts[k].destroy();charts[k]=null;}}
function fn(v){return '₩'+Math.round(v).toLocaleString();}
function fnM(v){return '₩'+(v/10000).toFixed(0)+'만';}
function pct(a,b){return b>0?((a/b)*100).toFixed(1)+'%':'0%';}

// Search
function onInput(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('suggestList');
  if(q.length < 1){ list.classList.add('hidden'); return; }
  const matches = PRODUCT_LIST.filter(p => p.toLowerCase().includes(q)).slice(0, 8);
  if(!matches.length){ list.classList.add('hidden'); return; }
  list.innerHTML = matches.map(p => {
    const hi = p.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<strong>$1</strong>');
    return '<div class="suggest-item" onclick="selectProduct(\''+p.replace(/'/g,"\\'")+'\')">'+hi+'</div>';
  }).join('');
  list.classList.remove('hidden');
}

function onKey(e){
  if(e.key === 'Enter') doSearch();
  if(e.key === 'Escape') document.getElementById('suggestList').classList.add('hidden');
}

function selectProduct(name){
  document.getElementById('searchInput').value = name;
  document.getElementById('suggestList').classList.add('hidden');
  renderReport(name);
}

function doSearch(){
  document.getElementById('suggestList').classList.add('hidden');
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  // exact match first
  if(PROD[q]){ renderReport(q); return; }
  // fuzzy match
  const lower = q.toLowerCase();
  const match = PRODUCT_LIST.find(p => p.toLowerCase().includes(lower));
  if(match){ renderReport(match); document.getElementById('searchInput').value = match; }
  else { alert('제품을 찾을 수 없습니다: '+q); }
}

document.addEventListener('click', e => {
  if(!e.target.closest('.search-pos')) document.getElementById('suggestList').classList.add('hidden');
});

function renderReport(name){

  rc.classList.remove('hidden');

  const ovsPct = 100 - domPct;
  const rankPct = Math.round((d.tp - d.r + 1)/d.tp*100);

  rc.innerHTML = `
  <div class="kstrip" style="margin-top:0">
    <div class="ki" style="display:flex;align-items:center;gap:14px;flex:2">
      <div class="rank-badge ${rankClass}">${rankLabel}</div>
      <div>
        <div style="font-size:15px;font-weight:800;color:#1a1a2e;margin-bottom:4px">${name}</div>
        <div>${seChips}</div>
      </div>
    </div>
    <div class="ki">
      <div class="kl">총 매출</div>
      <div class="kv" style="color:#6366f1;font-size:15px">${fnM(totalRev)}</div>
      <div class="ks">${fn(totalRev)}</div>
    </div>
    <div class="ki">
      <div class="kl">총 판매량</div>
      <div class="kv" style="color:#0891b2">${totalQty.toLocaleString()}<span style="font-size:12px;color:#94a3b8">개</span></div>
      <div class="ks">국내 ${d.dq} · 해외 ${d.oq}</div>
    </div>
    <div class="ki">
      <div class="kl">판매 가격</div>
      <div class="price-tag" style="font-size:18px">${priceHtml}</div>
      <div class="ks">중앙값 기준</div>
    </div>
    <div class="ki">
      <div class="kl">매출 순위</div>
      <div class="kv" style="color:#f59e0b">${d.r}위 <span style="font-size:11px;font-weight:400;color:#94a3b8">/ ${d.tp}개</span></div>
      <div class="rev-rank-bar"><div class="rev-rank-fill" style="width:${rankPct}%"></div></div>
    </div>
  </div>

  <div class="two">
    <div class="card">
      <div class="ct">📈 월별 판매량 추이</div>
      <div class="cs">국내 · 해외 월별 판매수량</div>
      <div class="cw" style="height:220px"><canvas id="rc1"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">🌍 국내 / 해외 주문 비율</div>
      <div class="cs">전체 판매 기준</div>
      <div class="cw" style="height:160px"><canvas id="rc2"></canvas></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div style="background:#f0f9ff;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;font-weight:700;color:#0891b2">국내자사몰</div>
          <div style="font-size:20px;font-weight:800;color:#0369a1">${domPct}%</div>
          <div style="font-size:10px;color:#64748b">${d.dq.toLocaleString()}개 · ${fnM(d.dr)}</div>
        </div>
        <div style="background:#faf5ff;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;font-weight:700;color:#7c3aed">해외자사몰</div>
          <div style="font-size:20px;font-weight:800;color:#6d28d9">${ovsPct}%</div>
          <div style="font-size:10px;color:#64748b">${d.oq.toLocaleString()}개 · ${d.po>0?'$'+d.po+' avg':fnM(d.or)}</div>

  renderTrendChart(d);

function renderCoItems(co){
  if(!co || !co.length) return '<div style="color:#94a3b8;font-size:13px;padding:20px 0;text-align:center">데이터 없음</div>';
  const max = co[0][1];
  const colors = ['#6366f1','#0891b2','#10b981','#f59e0b','#ef4444','#ec4899','#f97316','#8b5cf6'];
  return co.map(([name, cnt], i) => `
    <div class="co-item">
      <div style="font-size:11px;color:#374151;width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
      <div class="co-bar-wrap">
        <div class="co-bar" style="width:${Math.round(cnt/max*100)}%;background:${colors[i%colors.length]}">
          ${Math.round(cnt/max*100)>20?'<span class="co-bar-text">'+cnt+'일</span>':''}
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#374151;width:30px;text-align:right;flex-shrink:0">${cnt}</div>
    </div>
  `).join('');
}

function renderTrendChart(d){
  dc('rc1');
  const labels = MONTHS.map(m => m.replace('2025-','25.').replace('2026-','26.'));
  charts.rc1 = new Chart(document.getElementById('rc1').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {label:'국내',data:d.md,backgroundColor:'rgba(8,145,178,.75)',borderRadius:3},
        {label:'해외',data:d.mo,backgroundColor:'rgba(124,58,237,.75)',borderRadius:3},
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+c.parsed.y+'개'}}},
      scales:{
        y:{ticks:{font:{size:9}},grid:{color:'#f1f5f9'}},
        x:{ticks:{font:{size:8}},grid:{display:false}}
      }
    }
  });
}

function renderDonutChart(d, domPct, ovsPct){
  dc('rc2');
  charts.rc2 = new Chart(document.getElementById('rc2').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['국내자사몰 '+domPct+'%', '해외자사몰 '+ovsPct+'%'],
      datasets: [{data:[d.dq, d.oq], backgroundColor:['#0891b2','#7c3aed'], borderWidth:2, borderColor:'white', hoverOffset:4}]
    },
    options: {
      responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>' '+c.label+': '+c.parsed+'개'}}}
    }
  });
}

function renderRankChart(name, d){
  dc('rc3');
  // Show top 15 products by revenue with current highlighted
  const topNames = Object.keys(PROD).sort((a,b)=>PROD[a].r-PROD[b].r).slice(0,15);
  if(d.r > 15) topNames[14] = name; // replace last with current if not in top 15
  const isTop15 = d.r <= 15;
  const labels = topNames.map((n,i) => n===name ? '▶ '+n.slice(0,22) : n.slice(0,22));
  const revs = topNames.map(n => Math.round(PROD[n].tr/10000));
  const bgColors = topNames.map(n => n===name?'#6366f1cc':'#e2e8f080');
  charts.rc3 = new Chart(document.getElementById('rc3').getContext('2d'), {
    type: 'bar',
    data: {labels, datasets:[{label:'매출(만원)',data:revs,backgroundColor:bgColors,borderRadius:4}]},
    options:{
      responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' ₩'+c.parsed.x.toLocaleString()+'만'}}},
      scales:{x:{ticks:{font:{size:9}},grid:{color:'#f1f5f9'}},y:{ticks:{font:{size:9.5},autoSkip:false},grid:{display:false},afterFit(ax){ax.width=190;}}}
    }
  });
}

// Init: check if URL has query param ?product=...
(function(){
  const params = new URLSearchParams(window.location.search);
  const p = params.get('product');
  if(p && PROD[p]){
    document.getElementById('searchInput').value = p;
    renderReport(p);
  }
})();
</script>
