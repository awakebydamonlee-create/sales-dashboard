let charts = {};
let curProduct = null;
let dateFrom = '2025-01-01', dateTo = '2026-04-15';

function dc(k){if(charts[k]){charts[k].destroy();charts[k]=null;}}
function fnM(v){return '₩'+(v/10000).toFixed(0)+'만';}

// Filter daily rows for a product within date range
function getFilteredDaily(name){
  const rows = DAILY[name] || [];
  return rows.filter(r => r[0] >= dateFrom && r[0] <= dateTo);
}

// Aggregate filtered daily rows
function aggregateDaily(rows){
  let dq=0,oq=0,dr=0,or_=0;
  rows.forEach(r=>{dq+=r[1];oq+=r[2];dr+=r[3];or_+=r[4];});
  return {dq,oq,dr,or:or_,tr:dr+or_};
}

// Group daily rows by month for trend chart
function groupByMonth(rows){
  const map={};
  rows.forEach(r=>{
    const ym=r[0].slice(0,7);
    if(!map[ym])map[ym]={dq:0,oq:0,dr:0,or:0};
    map[ym].dq+=r[1];map[ym].oq+=r[2];map[ym].dr+=r[3];map[ym].or+=r[4];
  });
  // Get months in range
  const months=[];
  MONTHS.forEach(m=>{if(m>=dateFrom.slice(0,7)&&m<=dateTo.slice(0,7))months.push(m);});
  return {months, md:months.map(m=>(map[m]||{}).dq||0), mo:months.map(m=>(map[m]||{}).oq||0)};
}

// Group by day for day-level chart (when range <= 60 days)
function groupByDay(rows){
  const map={};
  rows.forEach(r=>{
    if(!map[r[0]])map[r[0]]={dq:0,oq:0};
    map[r[0]].dq+=r[1];map[r[0]].oq+=r[2];
  });
  const dates=Object.keys(map).sort();
  return {dates,md:dates.map(d=>map[d].dq),mo:dates.map(d=>map[d].oq)};
}

// Filtered co-purchase using monthly COP (approximate from month range)
function getFilteredCop(name){
  const fromM=dateFrom.slice(0,7), toM=dateTo.slice(0,7);
  const fi=MONTHS.indexOf(fromM)<0?0:MONTHS.indexOf(fromM);
  const ti=MONTHS.indexOf(toM)<0?MONTHS.length-1:MONTHS.indexOf(toM);
  const partners=COP[name];
  if(!partners)return[];
  return Object.entries(partners).map(([p,data])=>{
    const dom=data.d.slice(fi,ti+1).reduce((a,b)=>a+b,0);
    const ovs=data.o.slice(fi,ti+1).reduce((a,b)=>a+b,0);
    return {name:p,dom,ovs,total:dom+ovs};
  }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,8);
}

// Period revenue for rank chart
function getPeriodRev(n){
  const rows=DAILY[n]||[];
  let t=0;
  rows.forEach(r=>{if(r[0]>=dateFrom&&r[0]<=dateTo)t+=r[3]+r[4];});
  return t;
}

function setPeriod(p,btn){
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('rangeLabel').classList.add('hidden');
  if(p==='all'){dateFrom='2025-01-01';dateTo='2026-04-15';}
  else if(p==='2025'){dateFrom='2025-01-01';dateTo='2025-12-31';}
  else if(p==='2026'){dateFrom='2026-01-01';dateTo='2026-04-15';}
  document.getElementById('dtFrom').value=dateFrom;
  document.getElementById('dtTo').value=dateTo;
  if(curProduct)renderReport(curProduct);
}
function onDateChange(){document.querySelectorAll('.qb').forEach(b=>b.classList.remove('active'));}
function applyRange(){
  const f=document.getElementById('dtFrom').value,t=document.getElementById('dtTo').value;
  if(!f||!t||f>t){alert('시작일이 종료일보다 앞이어야 합니다.');return;}
  dateFrom=f;dateTo=t;
  const lbl=document.getElementById('rangeLabel');
  lbl.textContent=f+' ~ '+t;lbl.classList.remove('hidden');
  if(curProduct)renderReport(curProduct);
}

function onInput(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const list=document.getElementById('suggestList');
  if(q.length<1){list.classList.add('hidden');return;}
  const matches=PRODUCT_LIST.filter(p=>p.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){list.classList.add('hidden');return;}
  list.innerHTML=matches.map(p=>{
    const hi=p.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<strong>$1</strong>');
    return '<div class="suggest-item" onclick="selectProduct(\''+p.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\'  )">'+hi+'</div>';
  }).join('');
  list.classList.remove('hidden');
}
function onKey(e){if(e.key==='Enter')doSearch();if(e.key==='Escape')document.getElementById('suggestList').classList.add('hidden');}
function selectProduct(name){
  document.getElementById('searchInput').value=name;
  const sl=document.getElementById('suggestList');
  sl.classList.add('hidden');sl.innerHTML='';
  renderReport(name);
  setTimeout(()=>document.getElementById('dateBar').scrollIntoView({behavior:'smooth',block:'start'}),120);
}
function doSearch(){
  document.getElementById('suggestList').classList.add('hidden');
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  if(PROD[q]){renderReport(q);setTimeout(()=>document.getElementById('dateBar').scrollIntoView({behavior:'smooth',block:'start'}),120);return;}
  const match=PRODUCT_LIST.find(p=>p.toLowerCase().includes(q.toLowerCase()));
  if(match){
    renderReport(match);document.getElementById('searchInput').value=match;
    setTimeout(()=>document.getElementById('dateBar').scrollIntoView({behavior:'smooth',block:'start'}),120);
  }
  else alert('제품을 찾을 수 없습니다: '+q);
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-pos'))document.getElementById('suggestList').classList.add('hidden');});

function renderReport(name){
  const d=PROD[name];if(!d)return;
  curProduct=name;
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('reportContent').classList.remove('hidden');
  document.getElementById('dateBar').classList.remove('hidden');

  const filtRows=getFilteredDaily(name);
  const agg=aggregateDaily(filtRows);
  const cop=getFilteredCop(name);
  const isFiltered=!(dateFrom==='2025-01-01'&&dateTo==='2026-04-15');
  const periodLabel=isFiltered?(dateFrom+' ~ '+dateTo):'전체 기간';
  document.getElementById('hdrSub').textContent=name+' · '+periodLabel;

  const totalQty=agg.dq+agg.oq;
  const domPct=totalQty>0?Math.round(agg.dq/totalQty*100):0;
  const ovsPct=100-domPct;
  const rankClass=d.r===1?'rank-1':d.r===2?'rank-2':d.r===3?'rank-3':'rank-other';
  const rankLabel=d.r===1?'🥇':d.r===2?'🥈':d.r===3?'🥉':'#'+d.r;
  const rankPct=Math.round((d.tp-d.r+1)/d.tp*100);
  const seChips=d.se.map(s=>'<span class="se-chip">'+s+'</span>').join('');
  const priceHtml=d.pd>0?'<span style="color:#6366f1">₩'+d.pd.toLocaleString()+'</span>'+(d.po>0?' <span style="font-size:13px;color:#94a3b8">/ $'+d.po+'</span>':''):(d.po>0?'<span style="color:#6366f1">$'+d.po+'</span>':'-');

  // Determine chart mode: daily if range <= 62 days
  const dayDiff=(new Date(dateTo)-new Date(dateFrom))/(1000*60*60*24);
  const useDayChart=dayDiff<=62;

  document.getElementById('reportContent').innerHTML=`
  <div class="kstrip" style="margin-top:0">
    <div class="ki" style="display:flex;align-items:center;gap:14px;flex:2">
      <div class="rank-badge ${rankClass}">${rankLabel}</div>
      <div>
        <div style="font-size:15px;font-weight:800;color:#1a1a2e;margin-bottom:4px">${name}</div>
        <div>${seChips}</div>
        ${isFiltered?'<div style="font-size:10px;color:#6366f1;margin-top:4px;font-weight:600">📅 '+periodLabel+'</div>':''}
      </div>
    </div>
    <div class="ki"><div class="kl">기간 매출</div><div class="kv" style="color:#6366f1;font-size:15px">${fnM(agg.tr)}</div><div class="ks">${isFiltered?'전체 '+fnM(d.tr):'₩'+agg.tr.toLocaleString()}</div></div>
    <div class="ki"><div class="kl">기간 판매량</div><div class="kv" style="color:#0891b2">${totalQty.toLocaleString()}<span style="font-size:12px;color:#94a3b8">개</span></div><div class="ks">국내 ${agg.dq} · 해외 ${agg.oq}</div></div>
    <div class="ki"><div class="kl">판매 가격</div><div style="font-size:18px;font-weight:800">${priceHtml}</div><div class="ks">중앙값 기준</div></div>
    <div class="ki"><div class="kl">기간 매출 순위</div><div class="kv" style="color:#f59e0b" id="rankNum">계산중...</div><div class="rev-rank-bar"><div class="rev-rank-fill" style="width:${rankPct}%" id="rankBar"></div></div></div>
  </div>
  <div class="two">
    <div class="card"><div class="ct">📈 ${useDayChart?'일별':'월별'} 판매량 추이</div><div class="cs">${periodLabel} · 국내·해외 판매수량</div><div style="height:220px"><canvas id="rc1"></canvas></div></div>
    <div class="card"><div class="ct">🌍 국내 / 해외 주문 비율</div><div class="cs">${periodLabel} 기준</div>
      <div style="height:160px"><canvas id="rc2"></canvas></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div style="background:#f0f9ff;border-radius:10px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:700;color:#0891b2">국내자사몰</div><div style="font-size:20px;font-weight:800;color:#0369a1">${domPct}%</div><div style="font-size:10px;color:#64748b">${agg.dq.toLocaleString()}개 · ${fnM(agg.dr)}</div></div>
        <div style="background:#faf5ff;border-radius:10px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:700;color:#7c3aed">해외자사몰</div><div style="font-size:20px;font-weight:800;color:#6d28d9">${ovsPct}%</div><div style="font-size:10px;color:#64748b">${agg.oq.toLocaleString()}개 · ${fnM(agg.or)}</div></div>
      </div>
    </div>
  </div>
  <div class="two">
    <div class="card"><div class="ct">🛒 함께 구매한 상품 TOP 8</div><div class="cs">${periodLabel} · 국내+해외 기준 · 마우스 오버 시 전체 이름</div><div id="rc4wrap"><canvas id="rc4"></canvas></div></div>
    <div class="card"><div class="ct">📊 매출 순위 비교</div><div class="cs">${periodLabel} 기준 · 전체 ${d.tp}개 제품 중 · 마우스 오버 시 전체 이름</div><div id="rc3wrap"><canvas id="rc3"></canvas></div></div>
  </div>
  `;

  renderTrendChart(filtRows, useDayChart);
  renderDonutChart(agg, domPct, ovsPct);
  renderCopChart(cop);
  renderRankChart(name, d, periodLabel);
}

function splitLabel(name, maxLen){
  if(name.length<=maxLen) return name;
  // Split at last space before maxLen
  const idx=name.lastIndexOf(' ', maxLen);
  if(idx>0) return [name.slice(0,idx), name.slice(idx+1)];
  return [name.slice(0,maxLen), name.slice(maxLen)];
}
function renderTrendChart(rows, useDayChart){
  dc('rc1');
  let labels, md, mo;
  if(useDayChart){
    const g=groupByDay(rows);
    labels=g.dates.map(d=>d.slice(5));// MM-DD
    md=g.md;mo=g.mo;
  }else{
    const g=groupByMonth(rows);
    labels=g.months.map(m=>m.replace('2025-','25.').replace('2026-','26.'));
    md=g.md;mo=g.mo;
  }
  charts.rc1=new Chart(document.getElementById('rc1').getContext('2d'),{type:'bar',
    data:{labels,datasets:[
      {label:'국내',data:md,backgroundColor:'rgba(8,145,178,.75)',borderRadius:3},
      {label:'해외',data:mo,backgroundColor:'rgba(124,58,237,.75)',borderRadius:3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+c.parsed.y+'개'}}},
      scales:{y:{ticks:{font:{size:9}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:useDayChart?7:8},maxRotation:useDayChart?45:0},grid:{display:false}}}
    }
  });
}
function renderDonutChart(agg, domPct, ovsPct){
  dc('rc2');
  charts.rc2=new Chart(document.getElementById('rc2').getContext('2d'),{type:'doughnut',
    data:{labels:['국내자사몰 '+domPct+'%','해외자사몰 '+ovsPct+'%'],datasets:[{data:[agg.dq,agg.oq],backgroundColor:['#0891b2','#7c3aed'],borderWidth:2,borderColor:'white',hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>' '+c.label+': '+c.parsed+'개'}}}}
  });
}
function renderCopChart(cop){
  dc('rc4');
  if(!cop.length){
    const el=document.getElementById('rc4');
    if(el){el.parentElement.innerHTML+='<div style="color:#94a3b8;font-size:13px;padding:40px 0;text-align:center">해당 기간 데이터 없음</div>';el.remove();}
    return;
  }
  const rc4h=Math.max(240, cop.length*42+60);
  document.getElementById('rc4wrap').style.height=rc4h+'px';
  charts.rc4=new Chart(document.getElementById('rc4').getContext('2d'),{type:'bar',
    data:{labels:cop.map(x=>x.name.length>26?x.name.slice(0,26)+'…':x.name),datasets:[
      {label:'국내',data:cop.map(x=>x.dom),backgroundColor:'rgba(8,145,178,.8)',borderRadius:3,stack:'s'},
      {label:'해외',data:cop.map(x=>x.ovs),backgroundColor:'rgba(124,58,237,.8)',borderRadius:3,stack:'s'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{position:'top',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{title:t=>[cop[t[0].dataIndex].name],label:c=>' '+c.dataset.label+': '+c.parsed.x+'일'}}},
      scales:{x:{ticks:{font:{size:9}},grid:{color:'#f1f5f9'},stacked:true},y:{ticks:{font:{size:8},autoSkip:false},grid:{display:false},stacked:true,afterFit(ax){ax.width=230;}}}
    }
  });
}
function renderRankChart(name, d, periodLabel){
  dc('rc3');
  const allByRev=Object.keys(PROD).map(n=>{return {n,rev:getPeriodRev(n)};  }).sort((a,b)=>b.rev-a.rev);
  const topNames=allByRev.slice(0,15).map(x=>x.n);
  const curRank=allByRev.findIndex(x=>x.n===name)+1;
  if(curRank>15)topNames[14]=name;
  const revs=topNames.map(n=>Math.round(getPeriodRev(n)/10000));
  const el=document.getElementById('rankNum');
  if(el){el.textContent=curRank+'위 / '+d.tp+'개';el.style.color='#f59e0b';}
  const bar=document.getElementById('rankBar');
  if(bar)bar.style.width=Math.round((d.tp-curRank+1)/d.tp*100)+'%';
  const rc3h=Math.max(240, topNames.length*42+60);
  document.getElementById('rc3wrap').style.height=rc3h+'px';
  charts.rc3=new Chart(document.getElementById('rc3').getContext('2d'),{type:'bar',
    data:{labels:topNames.map(n=>n===name?'▶ '+(n.length>24?n.slice(0,24)+'…':n):(n.length>26?n.slice(0,26)+'…':n)),datasets:[{label:'매출(만원)',data:revs,backgroundColor:topNames.map(n=>n===name?'#6366f1cc':'#e2e8f080'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' ₩'+c.parsed.x.toLocaleString()+'만',title:t=>[topNames[t[0].dataIndex],'('+periodLabel+')']}}},
      scales:{x:{ticks:{font:{size:9}},grid:{color:'#f1f5f9'}},y:{ticks:{font:{size:8},autoSkip:false},grid:{display:false},afterFit(ax){ax.width=230;}}}
    }
  });
}
(function(){
  const p=new URLSearchParams(window.location.search).get('product');
  if(p&&PROD[p]){document.getElementById('searchInput').value=p;renderReport(p);}
})();
</script>
